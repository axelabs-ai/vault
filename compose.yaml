name: vault

services:
  vaultwarden:
    image: vaultwarden/server:1.35.8-alpine
    container_name: vault-app
    restart: unless-stopped
    # Secrets (ADMIN_TOKEN, DOMAIN, SIGNUPS_ALLOWED) injected from this file.
    # The argon2 hash contains '$' chars — env_file avoids compose interpolation.
    env_file:
      - ${VAULT_ENV_FILE:-./env.local}
    environment:
      WEBSOCKET_ENABLED: "true"
      SENDS_ALLOWED: "true"
      EMERGENCY_ACCESS_ALLOWED: "true"
      LOG_FILE: /data/vaultwarden.log
      LOG_LEVEL: warn
      EXTENDED_LOGGING: "true"
      EVENTS_DAYS_RETAIN: "90"
      TZ: Asia/Seoul
    volumes:
      - ./data:/data
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/alive"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: vault-caddy
    restart: unless-stopped
    depends_on:
      - vaultwarden
    ports:
      - "127.0.0.1:8222:80"
      - "127.0.0.1:8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data

  # MCP layer (라운드 11, 2026-05-13)
  # 부트스트랩 §1.2·§8.1 결정(vault MCP 미노출)을 운영 통일성 요구로 우회.
  # 보안 가드: 비밀번호 본문 절대 미반환, 메타데이터만 노출, Bearer 인증,
  # 전 호출 audit log. SoT 스펙: vault/mcp/Dockerfile + vault_mcp/server.py.
  mcp:
    image: vault-mcp:latest
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: vault-mcp
    restart: unless-stopped
    depends_on:
      vaultwarden:
        condition: service_healthy
    env_file:
      - ${VAULT_MCP_ENV_FILE:-/Users/realchoice/.config/truvia/vault-mcp.env}
    environment:
      VAULT_MCP_TRANSPORT: sse
      VAULT_MCP_HTTP_HOST: 0.0.0.0
      VAULT_MCP_HTTP_PORT: "8772"
      BW_SERVER_URL: https://vault-caddy:443
      VAULT_LOG_DIR: /app/logs
      VAULT_OWNER_PASSWORD_FILE: /run/secrets/vault_master_password
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:8772:8772"
    volumes:
      - ${HOME}/realchoice-ssot/logs:/app/logs
      - ${HOME}/backups/vault:/backups:ro
      - ${HOME}/.config/vault/MASTER_PASSWORD_INITIAL:/run/secrets/vault_master_password:ro  # pragma: allowlist secret
    deploy:
      resources:
        limits:
          memory: 384M

  # L2-1 + L2-2 + L3-1 + L3-2 uplift (2026-05-12)
  # Absorbs the two host LaunchAgents (com.realchoice.vault-backup, vault-health)
  # into a supercronic-driven container that follows the stream-level pattern.
  # Trade-off: mounts /var/run/docker.sock to call `docker exec vault-app
  # /vaultwarden backup`. Image is minimal alpine — no shell exposed beyond
  # supercronic + our 5 job scripts. See vault/cron/Dockerfile.
  cron:
    image: vault-cron:latest
    build:
      context: ./cron
      dockerfile: Dockerfile
    container_name: vault-cron
    restart: unless-stopped
    depends_on:
      vaultwarden:
        condition: service_healthy
    environment:
      VAULT_CONTAINER: vault-app
      VAULT_CADDY: vault-caddy
      VAULT_GPG_RECIPIENT: vault-backup@realchoice.co.kr
      VAULT_BACKUP_DIR: /backups
      VAULT_LOG_DIR: /logs
      VAULT_BACKUP_RETAIN_DAYS: "30"
      VAULT_HEALTH_LOG_RETAIN_DAYS: "7"
      TZ: Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/backups/vault:/backups
      - ${HOME}/realchoice-ssot/logs:/logs
      - ./data:/vault-data:ro
    deploy:
      resources:
        limits:
          memory: 128M
