name: vault

services:
  vaultwarden:
    image: vaultwarden/server:1.35.8-alpine
    container_name: vault-app
    restart: unless-stopped
    # Secrets (ADMIN_TOKEN, DOMAIN, SIGNUPS_ALLOWED) injected from this file.
    # The argon2 hash contains '$' chars — env_file avoids compose interpolation.
    env_file:
      - ${VAULT_ENV_FILE:-./env.local}
    environment:
      WEBSOCKET_ENABLED: "true"
      SENDS_ALLOWED: "true"
      EMERGENCY_ACCESS_ALLOWED: "true"
      LOG_FILE: /data/vaultwarden.log
      LOG_LEVEL: warn
      EXTENDED_LOGGING: "true"
      EVENTS_DAYS_RETAIN: "90"
      TZ: Asia/Seoul
    volumes:
      - ./data:/data
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/alive"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: vault-caddy
    restart: unless-stopped
    depends_on:
      - vaultwarden
    ports:
      - "127.0.0.1:8222:80"
      - "127.0.0.1:8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data

  # L2-1 + L2-2 + L3-1 + L3-2 uplift (2026-05-12)
  # Absorbs the two host LaunchAgents (com.realchoice.vault-backup, vault-health)
  # into a supercronic-driven container that follows the stream-level pattern.
  # Trade-off: mounts /var/run/docker.sock to call `docker exec vault-app
  # /vaultwarden backup`. Image is minimal alpine — no shell exposed beyond
  # supercronic + our 5 job scripts. See vault/cron/Dockerfile.
  cron:
    image: vault-cron:latest
    build:
      context: ./cron
      dockerfile: Dockerfile
    container_name: vault-cron
    restart: unless-stopped
    depends_on:
      vaultwarden:
        condition: service_healthy
    environment:
      VAULT_CONTAINER: vault-app
      VAULT_CADDY: vault-caddy
      VAULT_GPG_RECIPIENT: vault-backup@realchoice.co.kr
      VAULT_BACKUP_DIR: /backups
      VAULT_LOG_DIR: /logs
      VAULT_BACKUP_RETAIN_DAYS: "30"
      VAULT_HEALTH_LOG_RETAIN_DAYS: "7"
      TZ: Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/backups/vault:/backups
      - ${HOME}/realchoice-ssot/logs:/logs
      - ./data:/vault-data:ro
    deploy:
      resources:
        limits:
          memory: 128M
