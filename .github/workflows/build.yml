name: build-vault-image

on:
  push:
    branches: [main]
    paths:
      - "build/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag suffix (e.g. 1.34.1-6-axe.3)"
        required: true
        default: "1.34.1-6-axe.3"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            # On main push, tag with both 'main' (rolling) and a short SHA
            TAG="main-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Will build & push: ${IMAGE}"

      - name: Build & push (multi-arch)
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image }}
          PLATFORMS: linux/amd64,linux/arm64
          PUSH: "true"
        run: ./build/build.sh

      - name: Summary
        run: |
          echo "### Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tag.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tenants pull with: \`docker pull ${{ steps.tag.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
